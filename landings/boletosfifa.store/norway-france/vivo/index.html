
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión VIP | Noruega vs Francia | Copa Mundial 2026</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8a2e;
            --obsidian: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--obsidian);
            color: #e0e0e0;
            font-family: 'Cinzel', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }
        h1 {
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }
        .stream-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .video-placeholder {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #000;
            border: 2px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }
        .play-button {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }
        .play-button:hover {
            transform: scale(1.1);
        }
        .play-button::after {
            content: '';
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent var(--obsidian);
            margin-left: 5px;
        }
        .status-bar {
            margin-top: 20px;
            color: var(--gold);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .nav-footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
        }
        .btn-back {
            color: var(--gold);
            text-decoration: none;
            border: 1px solid var(--gold);
            padding: 10px 25px;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: var(--gold);
            color: var(--obsidian);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Transmisión de Élite</h1>
        <p>Noruega vs Francia | En Vivo desde el Gillette Stadium</p>
    </div>
    <div class="stream-container">
        <div class="video-placeholder">
            <div class="play-button"></div>
        </div>
        <div class="status-bar">Conexión Asegurada • Calidad Ultra HD 8K</div>
    </div>
    <div class="nav-footer">
        <a href="../index.html" class="btn-back">Volver al Portal de Juego</a>
    </div>
</body>
</html>
