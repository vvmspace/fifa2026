<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Match 16 en Vivo | Streaming VIP Mundial 2026</title>
    <meta name="description" content="Siga el Match 16 en vivo. Streaming de alta gama desde Inglewood.">
    <link rel="stylesheet" href="/index.css">
<style>

:root {
    --obsidian: #050505;
    --obsidian-deep: #000000;
    --gold-primary: #d4af37;
    --gold-glow: #f9e498;
    --gold-dark: #b8860b;
    --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e498 50%, #b8860b 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(212, 175, 55, 0.2);
    --text-main: #f0f0f0;
    --text-dim: #a0a0a0;
    --font-serif: 'Playfair Display', serif;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
}

body {
    background-color: var(--obsidian);
    color: var(--text-main);
    font-family: var(--font-sans);
    margin: 0;
    line-height: 1.7;
    overflow-x: hidden;
}

header {
    padding: 2rem;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    position: absolute;
    width: 100%;
    z-index: 100;
    top: 0;
    box-sizing: border-box;
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: var(--gold-primary);
    text-decoration: none;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.logo strong {
    color: white;
    font-weight: 300;
    opacity: 0.8;
}

main {
    padding-top: 6rem;
}

.hero {
    text-align: center;
    padding: 8rem 2rem 6rem;
    background: 
        radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
        var(--obsidian);
    position: relative;
    border-bottom: 1px solid var(--glass-border);
}

.hero h1 {
    font-family: var(--font-serif);
    font-size: 4.5rem;
    margin-bottom: 1.5rem;
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    line-height: 1.1;
}

.hero h1 small {
    display: block;
    font-family: var(--font-sans);
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 6px;
    color: var(--text-dim);
    -webkit-text-fill-color: var(--text-dim);
    margin-top: 2rem;
    font-weight: 400;
}

.match-score-card {
    display: inline-flex;
    align-items: center;
    gap: 4rem;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    padding: 2.5rem 5rem;
    border-radius: 100px;
    margin: 4rem 0;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

.match-score-card span {
    font-size: 3rem;
    font-weight: 800;
    color: white;
    font-family: var(--font-serif);
    letter-spacing: 2px;
}

.match-score-card strong {
    font-size: 1.2rem;
    color: var(--gold-primary);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
}

.hero p {
    max-width: 800px;
    margin: 0 auto;
    font-size: 1.3rem;
    color: var(--text-dim);
    font-style: italic;
    font-weight: 300;
}

.seo-content-block {
    max-width: 1000px;
    margin: 0 auto;
    padding: 8rem 2rem;
}

.seo-content-block h2 {
    font-family: var(--font-serif);
    font-size: 3rem;
    text-align: center;
    margin-bottom: 4rem;
    color: var(--gold-primary);
}

.seo-content-block p {
    margin-bottom: 2.5rem;
    font-size: 1.15rem;
    text-align: justify;
    color: var(--text-main);
    opacity: 0.85;
}

.c-actions {
    display: flex;
    gap: 25px;
    justify-content: center;
    margin-top: 5rem;
}

.btn {
    padding: 1.4rem 3rem;
    border-radius: 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    text-decoration: none;
    display: inline-block;
    font-size: 0.85rem;
    border: 1px solid transparent;
}

.btn-gold {
    background: var(--gold-gradient);
    color: var(--obsidian-deep);
    border: none;
    box-shadow: 0 15px 30px rgba(212, 175, 55, 0.15);
}

.btn-gold:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
    filter: brightness(1.1);
}

.btn-outline {
    background: transparent;
    color: var(--gold-primary);
    border: 1px solid var(--gold-primary);
}

.btn-outline:hover {
    background: var(--gold-primary);
    color: var(--obsidian-deep);
}

@media (max-width: 768px) {
    .hero h1 { font-size: 2.8rem; }
    .match-score-card { gap: 2rem; padding: 2rem 3rem; }
    .match-score-card span { font-size: 2rem; }
    .c-actions { flex-direction: column; align-items: center; }
    .btn { width: 100%; text-align: center; }
}

</style>
</head>
<body>
    <header class="luxury-header">
        <div class="logo">FIFA 2026 VIP</div>
    </header>
    <main class="streaming-section">
        <h1 class="gold-text">Streaming VIP: Match 16</h1>
        <p>Acceda a la señal premium del Match 16 y viva la pasión del fútbol en la máxima resolución.</p>
        <a href="#" class="btn-luxury" title="Activar transmisión Match 16">Activar Acceso Digital</a>
    </main>
</body>
</html>
