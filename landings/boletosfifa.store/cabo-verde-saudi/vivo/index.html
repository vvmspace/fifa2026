<!DOCTYPE html>
<html lang="es">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Cabo Verde vs Saudi Arabia Houston · FIFA 2026 en Vivo | boletosfifa.store
  </title>
  <link href="/index.css" rel="stylesheet"/>
 <style>

:root {
    --obsidian: #050505;
    --obsidian-deep: #000000;
    --gold-primary: #d4af37;
    --gold-glow: #f9e498;
    --gold-dark: #b8860b;
    --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e498 50%, #b8860b 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(212, 175, 55, 0.2);
    --text-main: #f0f0f0;
    --text-dim: #a0a0a0;
    --font-serif: 'Playfair Display', serif;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
}

body {
    background-color: var(--obsidian);
    color: var(--text-main);
    font-family: var(--font-sans);
    margin: 0;
    line-height: 1.7;
    overflow-x: hidden;
}

header {
    padding: 2rem;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    position: absolute;
    width: 100%;
    z-index: 100;
    top: 0;
    box-sizing: border-box;
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: var(--gold-primary);
    text-decoration: none;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.logo strong {
    color: white;
    font-weight: 300;
    opacity: 0.8;
}

main {
    padding-top: 6rem;
}

.hero {
    text-align: center;
    padding: 8rem 2rem 6rem;
    background: 
        radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
        var(--obsidian);
    position: relative;
    border-bottom: 1px solid var(--glass-border);
}

.hero h1 {
    font-family: var(--font-serif);
    font-size: 4.5rem;
    margin-bottom: 1.5rem;
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    line-height: 1.1;
}

.hero h1 small {
    display: block;
    font-family: var(--font-sans);
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 6px;
    color: var(--text-dim);
    -webkit-text-fill-color: var(--text-dim);
    margin-top: 2rem;
    font-weight: 400;
}

.match-score-card {
    display: inline-flex;
    align-items: center;
    gap: 4rem;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    padding: 2.5rem 5rem;
    border-radius: 100px;
    margin: 4rem 0;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

.match-score-card span {
    font-size: 3rem;
    font-weight: 800;
    color: white;
    font-family: var(--font-serif);
    letter-spacing: 2px;
}

.match-score-card strong {
    font-size: 1.2rem;
    color: var(--gold-primary);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
}

.hero p {
    max-width: 800px;
    margin: 0 auto;
    font-size: 1.3rem;
    color: var(--text-dim);
    font-style: italic;
    font-weight: 300;
}

.seo-content-block {
    max-width: 1000px;
    margin: 0 auto;
    padding: 8rem 2rem;
}

.seo-content-block h2 {
    font-family: var(--font-serif);
    font-size: 3rem;
    text-align: center;
    margin-bottom: 4rem;
    color: var(--gold-primary);
}

.seo-content-block p {
    margin-bottom: 2.5rem;
    font-size: 1.15rem;
    text-align: justify;
    color: var(--text-main);
    opacity: 0.85;
}

.c-actions {
    display: flex;
    gap: 25px;
    justify-content: center;
    margin-top: 5rem;
}

.btn {
    padding: 1.4rem 3rem;
    border-radius: 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    text-decoration: none;
    display: inline-block;
    font-size: 0.85rem;
    border: 1px solid transparent;
}

.btn-gold {
    background: var(--gold-gradient);
    color: var(--obsidian-deep);
    border: none;
    box-shadow: 0 15px 30px rgba(212, 175, 55, 0.15);
}

.btn-gold:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
    filter: brightness(1.1);
}

.btn-outline {
    background: transparent;
    color: var(--gold-primary);
    border: 1px solid var(--gold-primary);
}

.btn-outline:hover {
    background: var(--gold-primary);
    color: var(--obsidian-deep);
}

@media (max-width: 768px) {
    .hero h1 { font-size: 2.8rem; }
    .match-score-card { gap: 2rem; padding: 2rem 3rem; }
    .match-score-card span { font-size: 2rem; }
    .c-actions { flex-direction: column; align-items: center; }
    .btn { width: 100%; text-align: center; }
}

</style>
</head>
 <body>
  <header>
   <div class="header-content">
    <a class="logo" href="/">
     BOLETOSFIFA
     <strong>
      .STORE
     </strong>
    </a>
   </div>
  </header>
  <main>
   <section class="hero">
    <h1>
     Transmisión Elite
     <small>
      Cabo Verde vs Saudi Arabia Houston · FIFA 2026 - Vivo
     </small>
    </h1>
    <div class="match-score-card">
     <span>
      HOME
     </span>
     <strong>
      vs
     </strong>
     <span>
      AWAY
     </span>
    </div>
    <p>
     Sintonice la señal oficial en 4K.
    </p>
   </section>
   <div class="grid">
    <article class="card" style="grid-template-columns: 1fr; text-align: center; max-width: 700px; margin: 0 auto;">
     <div class="c-time">
      <span class="c-date">
       Streaming de Alta Fidelidad
      </span>
     </div>
     <div class="c-teams">
      <h3>
       Cobertura Global en 4K
      </h3>
      <p class="c-text" style="border:none; padding:0;">
       No pierda ningún detalle de Cabo Verde vs Saudi Arabia Houston · FIFA 2026.
      </p>
     </div>
     <div class="c-actions">
      <button class="btn btn-gold" onclick="window.location.href='https://www.ticketmaster.com/2026-world-cup-tickets/artist/4067734'">
       Ver en Vivo
      </button>
      <a class="btn btn-outline" href="/cabo-verde-saudi/">
       Volver a la Previa
      </a>
     </div>
    </article>
   </div>
  </main>
 </body>
</html>
