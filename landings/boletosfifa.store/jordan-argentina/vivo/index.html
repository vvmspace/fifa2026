<!DOCTYPE html>
<html lang="es-419">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Jordan vs Argentina en Vivo | Transmisión Premium Mundial 2026</title>
    <meta name="description" content="No se pierda ni un segundo del choque entre Jordania y Argentina. Transmisión en vivo en alta definición con análisis en tiempo real.">
    <style>
        :root {
            --obsidian: #0b0b0b;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
        }
        body {
            background-color: var(--obsidian);
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .luxury-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            padding: 80px 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--obsidian) 100%);
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border: 2px solid var(--gold);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }
        .play-button {
            width: 80px;
            height: 80px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 2;
        }
        .play-button:hover {
            transform: scale(1.2);
        }
        .play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid var(--obsidian);
            margin-left: 5px;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin-top: 40px;
            text-align: center;
        }
        .btn-luxury {
            display: inline-block;
            padding: 18px 36px;
            background: var(--gold-gradient);
            color: var(--obsidian);
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="luxury-container">
            <h1>Transmisión en Vivo</h1>
            <p style="color: #a0a0a0; font-size: 1.2rem;">Jordania vs Argentina - Copa del Mundo 2026</p>
        </div>
    </header>
    <main class="luxury-container">
        <div class="video-placeholder">
            <div class="play-button">
                <div class="play-icon"></div>
            </div>
            <div style="position: absolute; bottom: 20px; right: 20px; color: var(--gold); font-weight: 700;">LIVE HD</div>
        </div>
        <div class="glass-card">
            <h2>Acceso a la Señal Premium</h2>
            <p>Para acceder a la transmisión oficial en alta definición, por favor verifique su suscripción de acceso premium.</p>
            <a href="/jordan-argentina/boletos" class="btn-luxury">Ver Opciones de Acceso</a>
        </div>
    </main>
</body>
</html>
