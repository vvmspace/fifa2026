<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas Jordan vs Argentina | Acceso Exclusivo Copa Mundial 2026</title>
    <meta name="description" content="Asegure su lugar en el encuentro Jordania vs Argentina. Entradas oficiales y servicios de hospitalidad premium.">
    <style>
        :root {
            --obsidian: #0b0b0b;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
        }
        body {
            background-color: var(--obsidian);
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .luxury-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            padding: 80px 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--obsidian) 100%);
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }
        .btn-luxury {
            display: inline-block;
            padding: 20px 40px;
            background: var(--gold-gradient);
            color: var(--obsidian);
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
        }
        .btn-luxury:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="luxury-container">
            <h1>Entradas VIP</h1>
            <p style="color: #a0a0a0; font-size: 1.2rem;">Jordania vs Argentina - Copa Mundial 2026</p>
        </div>
    </header>
    <main class="luxury-container">
        <div class="glass-card">
            <p>Garantice su asistencia al partido más esperado del grupo. Ofrecemos acceso a las zonas más exclusivas del estadio, asegurando una experiencia inigualable.</p>
            <button onclick="window.location.href='https://www.ticketmaster.com/2026-world-cup-tickets/artist/4067734'" class="btn-luxury">Adquirir Entradas Ahora</button>
        </div>
    </main>
</body>
</html>
