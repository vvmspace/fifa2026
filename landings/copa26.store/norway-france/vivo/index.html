
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver en Vivo | Noruega vs Francia | Mundial 2026</title>
    <style>
        :root {
            --gold: #d4af37;
            --obsidian: #0a0a0b;
            --glass-border: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--obsidian);
            color: #e0e0e0;
            font-family: 'Cinzel', serif;
            margin: 0;
            text-align: center;
        }
        .stream-box {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            margin: 50px auto;
            border: 2px solid var(--gold);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }
        .play-btn {
            width: 70px;
            height: 70px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }
        .play-btn::after {
            content: '';
            border-style: solid;
            border-width: 10px 0 10px 20px;
            border-color: transparent transparent transparent #000;
            position: absolute;
            top: 20px; left: 25px;
        }
        .nav {
            margin-top: 30px;
        }
        .btn {
            color: var(--gold);
            text-decoration: none;
            border: 1px solid var(--gold);
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h1 style="color: var(--gold); margin-top: 50px;">Transmisión Directa</h1>
    <div class="stream-box">
        <div class="play-btn"></div>
    </div>
    <div class="nav">
        <a href="../index.html" class="btn">Volver al Juego</a>
    </div>
</body>
</html>
