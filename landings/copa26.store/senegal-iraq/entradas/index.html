<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas Senegal vs Irak - Copa26</title>
    <style>
        :root {
            --obsidian: #0a0a0a;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }
        body {
            background-color: var(--obsidian);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: var(--gold);
            font-family: 'Georgia', serif;
            text-transform: uppercase;
        }
        .cta-button {
            display: inline-block;
            padding: 20px 60px;
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            color: var(--obsidian);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.3rem;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>Entradas Senegal vs Irak</h1>
            <p>Acceso Garantizado a la Experiencia World Cup 2026</p>
            <br>
            <button class="cta-button" onclick="window.location.href='https://www.ticketmaster.com/2026-world-cup-tickets/artist/4067734'">Obtener Entradas</button>
        </div>
    </div>
</body>
</html>
