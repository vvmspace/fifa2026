<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Senegal vs Irak en Vivo | Copa26 Transmisión</title>
    <style>
        :root {
            --obsidian: #0a0a0a;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }
        body {
            background-color: var(--obsidian);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .player-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border: 2px solid var(--gold);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 30px;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
        }
        h1 {
            color: var(--gold);
            font-family: 'Georgia', serif;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge" style="color: var(--gold); font-weight: bold; margin-bottom: 20px;">LIVE SIGNAL - 4K RESOLUTION</div>
        <h1>Transmisión en Directo: Senegal vs Irak</h1>
        <div class="player-placeholder">
            <span>Sincronizando Señal...</span>
        </div>
        <div class="glass-card">
            <p>Bienvenidos a la plataforma de streaming elite para la Copa Mundial 2026. Disfrute del encuentro entre Senegal e Irak en alta definición.</p>
        </div>
    </div>
</body>
</html>
